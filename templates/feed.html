<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>发现 · AI学伴</title>
  <style>
    :root {
      --green-light: #e8f5e9;
      --green-mid:   #a5d6a7;
      --green-dark:  #4caf50;
      --blue-light:  #e3f2fd;
      --blue-mid:    #90caf9;
      --blue-dark:   #1976d2;
      --teal:        #26a69a;
      --white:       #ffffff;
      --bg:          #f0f7f4;
      --text:        #2e3a36;
      --text-muted:  #6b8f7a;
      --border:      #c8e6c9;
      --shadow:      0 4px 20px rgba(76,175,80,.10);
      --radius:      14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--white);
      border-bottom: 2px solid var(--green-mid);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(76,175,80,.08);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 20px; font-weight: 700; color: var(--teal); text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; gap: 10px; }
    .nav-link {
      color: var(--text-muted); text-decoration: none; font-size: 14px;
      padding: 6px 14px; border-radius: 8px; transition: all .2s;
    }
    .nav-link:hover, .nav-link.active { background: var(--green-light); color: var(--teal); }
    .btn-back {
      background: var(--green-light); color: var(--teal);
      border: 1.5px solid var(--green-mid); border-radius: 8px;
      padding: 7px 18px; font-size: 14px; cursor: pointer;
      text-decoration: none; transition: all .2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-back:hover { background: var(--green-mid); color: var(--white); }
    @media (max-width: 600px) { nav { padding: 0 16px; } .nav-links { gap: 4px; } }

    /* PAGE HEADER */
    .page-header {
      background: linear-gradient(135deg, var(--green-light), var(--blue-light));
      border-bottom: 1px solid var(--border);
      padding: 30px 32px 24px;
      text-align: center;
    }
    .page-header h1 { font-size: 24px; font-weight: 800; color: var(--teal); margin-bottom: 6px; }
    .page-header p { font-size: 14px; color: var(--text-muted); }

    /* FILTER TABS */
    .filter-bar {
      max-width: 960px; margin: 20px auto 0; padding: 0 20px;
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .filter-btn {
      padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      border: 1.5px solid var(--border); background: var(--white);
      color: var(--text-muted); cursor: pointer; transition: all .18s;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--teal); color: var(--teal); }
    .filter-btn.active { background: var(--teal); color: white; border-color: var(--teal); }

    /* FEED GRID */
    .feed-grid {
      max-width: 960px;
      margin: 20px auto 40px;
      padding: 0 20px;
      columns: 2;
      column-gap: 20px;
    }
    @media (max-width: 600px) {
      .feed-grid { columns: 1; }
      .page-header { padding: 24px 16px 18px; }
    }

    /* CARD */
    .feed-card {
      break-inside: avoid;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 20px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      overflow: hidden;
    }
    .feed-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(76,175,80,.18);
    }

    /* SVG fills card */
    .card-img svg { display:block; width:100%; height:100%; }
    .modal-img svg { display:block; width:100%; height:100%; }

    /* IMAGE PLACEHOLDER */
    .card-img {
      width: 100%;
      aspect-ratio: 16/9;
      background: #e0ede8;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 6px;
      color: #9dbfb2; font-size: 13px;
      overflow: hidden;
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-img .img-icon { font-size: 28px; opacity: .5; }
    .card-img .img-hint { font-size: 11px; opacity: .6; }

    .card-body { padding: 16px; }
    .card-meta {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .cat-tag {
      font-size: 11px; font-weight: 700; padding: 2px 9px;
      border-radius: 10px; white-space: nowrap;
    }
    .cat-fun      { background: #fff8e1; color: #f57f17; }
    .cat-science  { background: #e0f2f1; color: #00695c; }
    .cat-story    { background: #e3f2fd; color: #1565c0; }
    .cat-belief   { background: #f3e5f5; color: #6a1b9a; }
    .cat-emotion  { background: #fce4ec; color: #c62828; }

    .card-date { font-size: 11px; color: var(--text-muted); }
    .card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
    .card-desc  { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .card-footer {
      padding: 10px 16px 14px;
      display: flex; justify-content: flex-end;
      font-size: 12px; color: var(--teal); font-weight: 600;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(4px);
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--white); border-radius: 18px;
      width: 100%; max-width: 600px; max-height: 88vh;
      overflow-y: auto; box-shadow: 0 16px 56px rgba(0,0,0,.22);
    }
    .modal-img {
      width: 100%; aspect-ratio: 16/9;
      background: #e0ede8;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 6px; color: #9dbfb2;
      border-radius: 18px 18px 0 0; overflow: hidden;
    }
    .modal-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-img .img-icon { font-size: 40px; opacity: .4; }
    .modal-content { padding: 24px 26px 28px; }
    .modal-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .modal-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 16px; line-height: 1.4; }
    .modal-body {
      font-size: 15px; color: var(--text); line-height: 1.85;
      white-space: pre-wrap;
    }
    .modal-close {
      position: sticky; top: 0; float: right; margin: 14px 14px -14px 0;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,.12); border: none; cursor: pointer;
      font-size: 18px; color: #555; display: flex; align-items: center; justify-content: center;
      transition: background .2s; z-index: 1;
    }
    .modal-close:hover { background: rgba(0,0,0,.22); }

    footer {
      text-align: center; padding: 24px 20px;
      font-size: 13px; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>

从北京到纽约，从开罗到圣保罗，几乎所有人都听得懂它。

但它是怎么来的？

📜 主流语言学观点：
1839年，美国波士顿的一家报纸流行一种文字游戏——故意把词语拼错，然后用缩写。

"All correct"（一切正确）→ 故意拼成"Oll Korrect" → 缩写成"OK"

这个玩笑在报纸上出现了一次，本来可能就消失了。

但1840年，美国总统候选人马丁·范布伦的支持者成立了一个组织，叫"OK俱乐部"——因为范布伦的外号是"Old Kinderhook"（来自金德胡克镇的老人），缩写也是OK。

这让"OK"这个词被大量传播，然后随着美国文化向全世界扩散。

  function renderFeed(filter = 'all') {
    const grid = document.getElementById('feedGrid');
    const filtered = filter === 'all' ? CARDS : CARDS.filter(c => c.cat === filter);
    grid.innerHTML = filtered.map(c => `
      <div class="feed-card" onclick="openCard(${c.id})" data-cat="${c.cat}">
        <div class="card-img">${SVGS[c.id] || ''}</div>
        <div class="card-body">
          <div class="card-meta">
            <span class="cat-tag cat-${c.cat}">${c.catLabel}</span>
            <span class="card-date">${c.date}</span>
          </div>
          <div class="card-title">${c.title}</div>
          <div class="card-desc">${c.desc}</div>
        </div>
        <div class="card-footer">阅读全文 →</div>
      </div>
    `).join('');
  }

  function filterCards(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeed(cat);
  }

  function openCard(id) {
    const c = CARDS.find(x => x.id === id);
    if (!c) return;
    document.getElementById('modalCat').className = `cat-tag cat-${c.cat}`;
    document.getElementById('modalCat').textContent = c.catLabel;
    document.getElementById('modalDate').textContent = c.date;
    document.getElementById('modalTitle').textContent = c.title;
    document.getElementById('modalBody').textContent = c.body;
    const imgEl = document.getElementById('modalImg');
    imgEl.innerHTML = SVGS[c.id] || '';
    document.getElementById('cardModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    document.getElementById('modalBox').scrollTop = 0;
  }

  function closeModal() {
    document.getElementById('cardModal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  document.getElementById('cardModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  renderFeed();
</script>
